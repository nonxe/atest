<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATASSA-MD | Pairing Dashboard</title>
    <style>
        :root {
            color-scheme: dark;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0f1117;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 560px;
            border-radius: 14px;
            background: #161b22;
            border: 1px solid #2c313a;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }
        h1 {
            margin: 0 0 10px;
            font-size: 1.4rem;
        }
        p {
            margin: 0 0 16px;
            color: #c5c9d3;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }
        .tile {
            border: 1px solid #2c313a;
            background: #11161e;
            border-radius: 10px;
            padding: 10px;
        }
        .tile small {
            color: #8d96a6;
            display: block;
            margin-bottom: 4px;
        }
        .tile b {
            font-size: 1.1rem;
        }
        form {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        input, button {
            border-radius: 10px;
            border: 1px solid #2c313a;
            background: #0d1117;
            color: #fff;
            padding: 10px 12px;
        }
        input {
            flex: 1;
        }
        button {
            background: #1f6feb;
            border-color: #1f6feb;
            cursor: pointer;
            font-weight: bold;
        }
        #result {
            margin-top: 14px;
            border: 1px dashed #2c313a;
            border-radius: 10px;
            padding: 12px;
            min-height: 44px;
            background: #0f141c;
            color: #dbe3f2;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>✅ ATASSA-MD Pairing Panel</h1>
    <p>Heroku pe deploy karo, Open App pe click karo, number dalo aur pairing code se direct bot connect karo. Session ID ki need nahi hai.</p>

    <div class="stats">
        <div class="tile">
            <small>Ping</small>
            <b id="ping">--</b>
        </div>
        <div class="tile">
            <small>Connected Bots</small>
            <b id="connected">0 / 5</b>
        </div>
    </div>

    <form id="pairForm">
        <input id="number" type="text" placeholder="Enter number (e.g. 919876543210)" required />
        <button type="submit">Get Pair Code</button>
    </form>

    <div id="result">Status: Ready.</div>
</div>

<script>
    async function refreshStatus() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();
            document.getElementById('ping').textContent = `${data.pingMs} ms`;
            document.getElementById('connected').textContent = `${data.connectedBots} / ${data.maxBots}`;
        } catch (_) {}
    }

    document.getElementById('pairForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('number');
        const result = document.getElementById('result');
        result.textContent = 'Generating pairing code...';
        try {
            const res = await fetch('/api/pair', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ number: input.value.trim() })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Failed to generate code');
            result.textContent = `Pairing Code for ${data.number}: ${data.pairingCode}\n\nWhatsApp > Linked devices > Link with phone number`;
            input.value = '';
            refreshStatus();
        } catch (err) {
            result.textContent = `Error: ${err.message}`;
        }
    });

    refreshStatus();
    setInterval(refreshStatus, 5000);
</script>
</body>
</html>
